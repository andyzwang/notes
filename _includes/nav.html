<nav>
  <div class="nav-bar">
    <a
      class="internal-link site-title{% unless page.url == '/' %} site-title-faded{% endunless %}"
      href="{{ site.baseurl }}/"
    >
      <b>{{ site.title }}</b>
    </a>

    <div class="nav-links" id="nav-links">
      <div class="nav-links-inner">
        <a class="internal-link nav-faded" href="{{ site.baseurl }}/the-canon/">The Canon</a>
        <a class="internal-link nav-faded" href="{{ site.baseurl }}/passages/">Passages</a>
        <a class="internal-link nav-faded" href="{{ site.baseurl }}/about/">About</a>
      </div>
    </div>

    <span id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode" role="switch" aria-checked="false">
      <div class="theme-toggle-slide"></div>
      <div class="theme-toggle-switch"></div>
    </span>

    <button
      id="nav-toggle"
      class="nav-toggle"
      aria-label="Menu"
      aria-controls="nav-links"
      aria-expanded="false"
    >
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
  </div>
</nav>

<script>
  // Dark-mode toggle. Runs inline (not deferred) so the theme class is applied
  // as early as possible, minimising a flash of the wrong theme (FOUC).
  (function () {
    var bodyClassList = document.body.classList;
    // Prefer the saved choice; otherwise fall back to the OS colour scheme.
    var theme = localStorage.theme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    bodyClassList.toggle('theme-dark', theme === 'dark');

    var darkModeToggle = document.getElementById('theme-toggle');

    function updateThemeState() {
      var isDarkMode = bodyClassList.contains('theme-dark');
      localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      darkModeToggle.setAttribute('aria-checked', isDarkMode.toString());
    }

    function toggleTheme() {
      bodyClassList.toggle('theme-dark');
      updateThemeState();
    }

    darkModeToggle.addEventListener('click', toggleTheme);

    // Keyboard shortcut: press "d" to toggle the theme, but ignore it while
    // typing in a field or when it's part of a browser/OS chord (Ctrl/Cmd+D).
    window.addEventListener('keydown', function (e) {
      if (!['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) && e.key.toLowerCase() === 'd' && !e.ctrlKey && !e.metaKey) {
        toggleTheme();
      }
    });

    darkModeToggle.setAttribute('aria-checked', bodyClassList.contains('theme-dark').toString());
  })();

  // Mobile hamburger: toggle the links panel open/closed. The .open class is
  // only acted on inside the mobile breakpoint, so this is a no-op on desktop.
  (function () {
    var navToggle = document.getElementById('nav-toggle');
    var navLinks = document.getElementById('nav-links');
    if (!navToggle || !navLinks) return;

    navToggle.addEventListener('click', function () {
      var open = navLinks.classList.toggle('open');
      navToggle.setAttribute('aria-expanded', open.toString());
    });
  })();
</script>
