<style>
  .links line {
    stroke: var(--color-border);
    opacity: 0.5;
  }

  /* Hovered node's links take on a subdued version of that node's colour:
     yellow for the current page, purple for other created pages. */
  .links line.link-highlight-yellow {
    stroke: var(--color-yellow-soft);
    opacity: 1;
  }

  .links line.link-highlight-purple {
    stroke: var(--color-purple-soft);
    opacity: 1;
  }

  .nodes circle {
    cursor: pointer;
    fill: var(--color-purple);
    transition: all 0.15s ease-out;
  }

  .text text {
    cursor: pointer;
    fill: var(--color-text);
    text-shadow: -1px -1px 0 var(--color-bg), 1px -1px 0 var(--color-bg), -1px 1px 0 var(--color-bg), 1px 1px 0 var(--color-bg);
  }

  .nodes [active],
  .text [active] {
    cursor: pointer;
    fill: var(--color-yellow);
  }

  .nodes [ghost],
  .text [ghost] {
    cursor: help;
    fill: var(--color-subtext);
    opacity: 0.6;
  }

  /* Keep ghost node circles opaque so highlighted links don't show through
     them; the faded look stays on the ghost labels only. */
  .nodes [ghost] {
    opacity: 1;
  }

  /* Hovered label is bolded and raised above other labels via .raise() in the
     mouseover handler. */
  .text text.hovered {
    font-weight: bold;
    opacity: 1;
  }

  /* Non-active labels also pop to full-strength text color on hover; the
     active/current-page label keeps its red. */
  .text text.hovered:not([active]) {
    fill: var(--color-text);
  }

  .inactive {
    opacity: 0.1;
    transition: all 0.15s ease-out;
  }

  #graph-wrapper {
    position: relative;
    background: var(--color-bg-soft);
    border-radius: 4px;
    height: auto;
  }

  #graph-wrapper > svg {
    max-width: 100%;
    display: block;
  }

  #graph-zoom-controls {
    position: absolute;
    top: 0.5em;
    right: 0.5em;
    display: flex;
    gap: 0.25em;
    z-index: 1;
  }

  #graph-zoom-controls button {
    width: 1.8em;
    height: 1.8em;
    border: none;
    background: none;
    color: var(--color-subtext);
    font-size: 1em;
    line-height: 1;
    cursor: pointer;
    transition: color 150ms;
  }

  #graph-zoom-controls button:hover {
    color: var(--color-text);
  }
</style>

<div id="graph-wrapper">
  <div id="graph-zoom-controls">
    <button id="graph-zoom-out" aria-label="Zoom out" title="Zoom out">&minus;</button>
    <button id="graph-zoom-in" aria-label="Zoom in" title="Zoom in">+</button>
  </div>
  <script>
    window.addEventListener("load", loadGraph);

    function loadGraph() {
      var oScript = document.createElement("script");
      oScript.src = "https://cdnjs.cloudflare.com/ajax/libs/d3/5.16.0/d3.min.js";
      oScript.crossOrigin = 'anonymous';
      oScript.integrity =
        "sha512-FHsFVKQ/T1KWJDGSbrUhTJyS1ph3eRrxI228ND0EGaEp6v4a/vGwPWd3Dtd/+9cI7ccofZvl/wulICEurHN1pg==";
      document.body.appendChild(oScript);
      oScript.onload = () => {
        const MINIMAL_NODE_SIZE = 8;
        const MAX_NODE_SIZE = 12;
        const ACTIVE_RADIUS_FACTOR = 1.5;
        const STROKE = 1;
        const FONT_SIZE = 16;
        const TICKS = 400;
        const FONT_BASELINE = 28;
        const MAX_LABEL_LENGTH = 50;

        // The About page shows a whole-graph overview: fit every node in the
        // window, and reveal nodes by degree as you zoom in (biggest first).
        const ABOUT_MODE = {% if page.id == 'about' %}true{% else %}false{% endif %};
        // A node is shown once degree * zoom >= this; smaller/less-connected
        // nodes appear as you zoom in. Higher = fewer nodes visible when zoomed
        // out.
        const LOD_CONSTANT = 2.2;

        const graphData = {% include notes_graph.json %}
        let nodesData = graphData.nodes;
        let linksData = graphData.edges;

        const nodeSize = {};

        const updateNodeSize = () => {
          nodesData.forEach((el) => {
            let weight =
              3 *
              Math.sqrt(
                linksData.filter((l) => l.source.id === el.id || l.target.id === el.id)
                  .length + 1
              );
            if (weight < MINIMAL_NODE_SIZE) {
              weight = MINIMAL_NODE_SIZE;
            } else if (weight > MAX_NODE_SIZE) {
              weight = MAX_NODE_SIZE;
            }
            nodeSize[el.id] = weight;
          });
        };

        // Link thickness scales with the nodes it connects — averaging the two
        // endpoint sizes so a link is thicker when either end is a bigger hub.
        const endpointSize = (endpoint) =>
          nodeSize[endpoint && endpoint.id != null ? endpoint.id : endpoint];
        const linkWidth = (d) =>
          STROKE * ((endpointSize(d.source) + endpointSize(d.target)) / 2 / MINIMAL_NODE_SIZE);

        const onClick = (d) => {
          if (!d.path) return;
          window.location = d.path
        };

        const onMouseover = function (d) {
          const relatedNodesSet = new Set();
          linksData
            .filter((n) => n.target.id == d.id || n.source.id == d.id)
            .forEach((n) => {
              relatedNodesSet.add(n.target.id);
              relatedNodesSet.add(n.source.id);
            });

          node.attr("class", (node_d) => {
            if (node_d.id !== d.id && !relatedNodesSet.has(node_d.id)) {
              return "inactive";
            }
            return "";
          });

          // Colour the hovered node's links to match the node: yellow for the
          // current page, purple for other created (non-ghost) pages.
          let linkHighlight = "";
          if (isCurrentPath(d.path)) {
            linkHighlight = "link-highlight-yellow";
          } else if (!d.ghost) {
            linkHighlight = "link-highlight-purple";
          }

          link.attr("class", (link_d) => {
            if (link_d.source.id !== d.id && link_d.target.id !== d.id) {
              return "inactive";
            }
            return linkHighlight;
          });

          link.attr("stroke-width", (link_d) => {
            if (link_d.source.id === d.id || link_d.target.id === d.id) {
              return linkWidth(link_d) * 4;
            }
            return linkWidth(link_d);
          });
          text.attr("class", (text_d) => {
            if (text_d.id !== d.id && !relatedNodesSet.has(text_d.id)) {
              return "inactive";
            }
            return "";
          });

          // Make the hovered label black and paint it above any overlapping
          // labels (SVG paint order = document order, so move it last).
          text
            .filter((text_d) => text_d.id === d.id)
            .classed("hovered", true)
            .raise();
        };

        // Resting state: the current page's links are already yellow, so the
        // active note's connections read at a glance without hovering.
        const applyDefaultLinkState = () => {
          link.attr("class", (link_d) =>
            isCurrentPath(link_d.source.path) || isCurrentPath(link_d.target.path)
              ? "link-highlight-yellow"
              : ""
          );
          link.attr("stroke-width", linkWidth);
        };

        const onMouseout = function (d) {
          node.attr("class", "");
          text.attr("class", "");
          applyDefaultLinkState();
        };

        const graphWrapper = document.getElementById('graph-wrapper')
        const element = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        element.setAttribute("width", graphWrapper.getBoundingClientRect().width);
        element.setAttribute("height", window.innerHeight * 0.8);
        graphWrapper.appendChild(element);

        const svg = d3.select("svg");
        let width = Number(svg.attr("width"));
        let height = Number(svg.attr("height"));
        let zoomLevel = 1;

        // Obsidian-style physics: strong many-body repulsion (not collision)
        // is the spacer, balanced by spring links and a weak center pull. This
        // gives the organic, evenly-floating spread rather than a packed ring.
        // A weak center pull keeps leaf/disconnected nodes from drifting off;
        // the active note is pulled a little harder for slight emphasis.
        const centeringStrength = (d) => (isCurrentPath(d.path) ? 0.12 : 0.05);
        const forceX = d3.forceX().x(width / 2).strength(centeringStrength);
        const forceY = d3.forceY().y(height / 2).strength(centeringStrength);
        const forceCenter = d3.forceCenter(width / 2, height / 2);

        // Degree per node id (source/target may be ids or resolved node objects
        // depending on when this runs, so accept either).
        const degree = {};
        linksData.forEach((l) => {
          const s = l.source.id != null ? l.source.id : l.source;
          const t = l.target.id != null ? l.target.id : l.target;
          degree[s] = (degree[s] || 0) + 1;
          degree[t] = (degree[t] || 0) + 1;
        });

        const simulation = d3
          .forceSimulation(nodesData)
          .force("forceX", forceX)
          .force("forceY", forceY)
          // Repulsion scales with node size (hubs clear more space), and
          // loosely-linked "individuals" (degree 1) repel extra hard so they
          // drift out of dense clusters rather than crowding them — well-linked
          // nodes are already held in place by their own links.
          .force(
            "charge",
            d3.forceManyBody().strength((d) => {
              const individualBoost = (degree[d.id] || 0) <= 1 ? 1.8 : 1;
              return -130 * nodeSize[d.id] * individualBoost;
            })
          )
          .force(
            "link",
            d3
              .forceLink(linksData)
              .id((d) => d.id)
              // Leaf nodes (single link) sit farther out so they float clear of
              // the clusters; densely-linked nodes stay closer in.
              .distance((d) => {
                const s = d.source.id != null ? d.source.id : d.source;
                const t = d.target.id != null ? d.target.id : d.target;
                return degree[s] === 1 || degree[t] === 1 ? 190 : 130;
              })
          )
          .force("center", forceCenter)
          // Collision as a minimum-gap floor — repulsion still does the real
          // spacing. Kept soft (low strength) to preserve the organic look, but
          // with extra iterations so the odd exact-overlap still resolves.
          .force("collision", d3.forceCollide().radius((d) => nodeSize[d.id] + 24).strength(0.8).iterations(2))
          .stop();

        const g = svg.append("g");
        let link = g.append("g").attr("class", "links").selectAll(".link");
        let node = g.append("g").attr("class", "nodes").selectAll(".node");
        let text = g.append("g").attr("class", "text").selectAll(".text");

        const resize = () => {
          if (d3.event) {
            const scale = d3.event.transform;
            zoomLevel = scale.k;
            g.attr("transform", scale);
          }

          const zoomOrKeep = (value) => (zoomLevel >= 1 ? value / zoomLevel : value);

          let font;
          if (ABOUT_MODE) {
            // Size labels by on-screen pixels: larger when zoomed out (so the
            // overview is legible) and easing down a bit as you zoom in.
            // `g` scales by zoomLevel, so divide to get the local font size.
            const screenFont = Math.max(12, Math.min(20, 14 / Math.sqrt(zoomLevel)));
            font = screenFont / zoomLevel;
          } else {
            font = Math.max(Math.round(zoomOrKeep(FONT_SIZE)), 1);
          }

          text.attr("font-size", (d) => font);
          text.attr("y", (d) => d.y - zoomOrKeep(FONT_BASELINE) + 8);
          link.attr("stroke-width", (d) => zoomOrKeep(linkWidth(d)));
          node.attr("r", (d) => {
            return zoomOrKeep(nodeSize[d.id]);
          });
          svg
            .selectAll("circle")
            .filter((_d, i, nodes) => d3.select(nodes[i]).attr("active"))
            .attr("r", (d) => zoomOrKeep(ACTIVE_RADIUS_FACTOR * nodeSize[d.id]));

          if (ABOUT_MODE) {
            // Level of detail: nodes and links always show (a "cloud" around the
            // hubs), but only well-connected nodes are labelled when zoomed out —
            // smaller nodes' titles appear as you zoom in.
            const labelVisible = (d) => (degree[d.id] || 0) * zoomLevel >= LOD_CONSTANT;
            text.style("display", (d) => (labelVisible(d) ? null : "none"));
          }
        };

        const ticked = () => {
          node.attr("cx", (d) => d.x).attr("cy", (d) => d.y);
          text
            .attr("x", (d) => d.x)
            .attr("y", (d) => d.y - (FONT_BASELINE - nodeSize[d.id]) / zoomLevel);
          link
            .attr("x1", (d) => d.source.x)
            .attr("y1", (d) => d.source.y)
            .attr("x2", (d) => d.target.x)
            .attr("y2", (d) => d.target.y);
        };

        const restart = () => {
          updateNodeSize();
          node = node.data(nodesData, (d) => d.id);
          node.exit().remove();
          node = node
            .enter()
            .append("circle")
            .attr("r", (d) => {
              return nodeSize[d.id];
            })
            .on("click", onClick)
            .on("mouseover", onMouseover)
            .on("mouseout", onMouseout)
            .merge(node);

          link = link.data(linksData, (d) => `${d.source.id}-${d.target.id}`);
          link.exit().remove();
          link = link.enter().append("line").attr("stroke-width", linkWidth).merge(link);

          text = text.data(nodesData, (d) => d.label);
          text.exit().remove();
          text = text
            .enter()
            .append("text")
            .attr("font-size", `${FONT_SIZE}px`)
            .attr("text-anchor", "middle")
            .attr("alignment-baseline", "central")
            .on("click", onClick)
            .on("mouseover", onMouseover)
            .on("mouseout", onMouseout)
            .merge(text);

          text.each(function (d) {
            renderLabel(d3.select(this), d.label.replace(/_*/g, ""), MAX_LABEL_LENGTH);
          });

          node.attr("active", (d) => isCurrentPath(d.path) ? true : null);
          text.attr("active", (d) => isCurrentPath(d.path) ? true : null);
          node.attr("ghost", (d) => d.ghost ? true : null);
          text.attr("ghost", (d) => d.ghost ? true : null);

          [node, text].forEach((selection) => {
            selection.each(function (d) {
              let title = this.querySelector('title');
              if (!title) {
                title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                this.appendChild(title);
              }
              title.textContent = d.ghost ? 'There is no note that matches this link.' : '';
            });
          });

          simulation.nodes(nodesData);
          simulation.force("link").links(linksData);
          simulation.alpha(1).restart();
          simulation.stop();

          for (let i = 0; i < TICKS; i++) {
            simulation.tick();
          }

          ticked();
          applyDefaultLinkState();
        };

        const zoomHandler = d3.zoom().scaleExtent([ABOUT_MODE ? 0.1 : 0.2, 3]).on("zoom", resize);

        zoomHandler(svg);

        const ZOOM_BUTTON_SCALE_FACTOR = 1.3;

        document.getElementById('graph-zoom-in').addEventListener('click', () => {
          zoomHandler.scaleBy(svg.transition().duration(150), ZOOM_BUTTON_SCALE_FACTOR);
        });

        document.getElementById('graph-zoom-out').addEventListener('click', () => {
          zoomHandler.scaleBy(svg.transition().duration(150), 1 / ZOOM_BUTTON_SCALE_FACTOR);
        });
        restart();

        // Fit every node inside the viewport — used for the About overview,
        // and adapts to whatever the viewport dimensions are (desktop/mobile).
        const fitToBounds = () => {
          const PADDING = 70; // room for node radii + labels near the edges
          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
          nodesData.forEach((d) => {
            if (d.x < minX) minX = d.x;
            if (d.y < minY) minY = d.y;
            if (d.x > maxX) maxX = d.x;
            if (d.y > maxY) maxY = d.y;
          });
          const graphW = maxX - minX || 1;
          const graphH = maxY - minY || 1;
          const scale = Math.min(
            width / (graphW + PADDING * 2),
            height / (graphH + PADDING * 2),
            1
          );
          const cx = (minX + maxX) / 2;
          const cy = (minY + maxY) / 2;
          const dx = width / 2 - scale * cx;
          const dy = height / 2 - scale * cy;
          svg.call(zoomHandler.transform, d3.zoomIdentity.translate(dx, dy).scale(scale));
        };

        const activeNode = nodesData.find((d) => isCurrentPath(d.path));
        if (ABOUT_MODE) {
          fitToBounds();
        } else if (activeNode) {
          // Start more zoomed out on narrow (mobile) viewports so the whole
          // graph is visible.
          const initialScale = window.innerWidth <= 768 ? 0.55 : 1;
          // Pan most of the way toward the current article so it sits near the
          // centre without fully uprooting the natural layout.
          const recenterFactor = 0.66;
          const dx = (width / 2 - initialScale * activeNode.x) * recenterFactor;
          const dy = (height / 2 - initialScale * activeNode.y) * recenterFactor;
          svg.call(
            zoomHandler.transform,
            d3.zoomIdentity.translate(dx, dy).scale(initialScale)
          );
        }

        const reportWindowSize = () => {
          width = graphWrapper.getBoundingClientRect().width;
          height = window.innerHeight * 0.8;

          element.setAttribute("width", width);
          element.setAttribute("height", height);

          forceX.x(width / 2);
          forceY.y(height / 2);
          forceCenter.x(width / 2).y(height / 2);

          restart();

          // Re-fit the overview to the new viewport dimensions.
          if (ABOUT_MODE) {
            fitToBounds();
          }
        };

        window.onresize = reportWindowSize;

        function isCurrentPath(notePath) {
          return !!notePath && window.location.pathname.includes(notePath)
        }

        function shorten(str, maxLen, separator = ' ') {
          if (str.length <= maxLen) return str;
          return str.substr(0, str.lastIndexOf(separator, maxLen)) + '...';
        }

        function renderLabel(textSelection, label, maxLen) {
          const plain = label.replace(/<\/?em>/g, '');
          textSelection.selectAll('tspan').remove();

          if (plain.length > maxLen) {
            textSelection.text(shorten(plain, maxLen));
            return;
          }

          textSelection.text(null);
          label.split(/(<em>.*?<\/em>)/g).filter(Boolean).forEach((segment) => {
            const match = segment.match(/^<em>(.*)<\/em>$/);
            textSelection
              .append('tspan')
              .style('font-style', match ? 'italic' : 'normal')
              .text(match ? match[1] : segment);
          });
        }
      }
    }
  </script>
</div>
